############################################################################
# Stonefish simulator configuration file                                   #
############################################################################

[Require common/imc-addresses.ini]
[Require common/transports.ini]
[Require auv/plans.ini]
[Require auv/transports.ini]
[Require auv/control.ini]
[Require auv/navigation.ini]
[Require auv/maneuvers.ini]
[Require auv/monitors.ini]
[Require auv/supervisors.ini]
[Require auv/general.ini]

[General]
Vehicle                     = lauv-simulator-1
Vehicle Type                = lauv
Absolute Maximum Depth      = 100

[Transports.Announce]
Enabled                     = Always

[Transports.Discovery]
Enabled                     = Always

[Transports.TCP.Server/BackSeat]
Enabled                     = Never

[Transports.TCP.Server/SlaveCPU]
Enabled                     = Never

[Simulators.VSIM]
Enabled                     = Never

[Simulators.Gaussian/SoundSpeed]
Enabled                     = Always
Entity Label                = Sound Speed Simulator
Name of message to produce  = SoundSpeed
Value at peak               = 1522
Value away from peak        = 1500
Invalid at Surface          = true

[Navigation.AUV.Navigation]
Entity Label - Compass      = IMU # Navigation takes EulerAngles+Acceleration from Compass

[Simulators.StoneFish]
Enabled                     = Always
Debug Level                 = Debug
Entity Label                = Simulation Engine
Scenario Path               = sim/lauv-1.scn
Enable Graphics             = True

